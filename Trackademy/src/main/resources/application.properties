spring.application.name=Trackademy

# ── BASE DE DONNÉES ───────────────────────────────────────────────────────────
# En production : variables d'environnement injectées par Railway/Render
# En développement : valeurs locales par défaut
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/trackademydb?useSSL=false&serverTimezone=UTC&useLegacyDatetimeCode=false}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:crosemont}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── HIBERNATE ─────────────────────────────────────────────────────────────────
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# ── THYMELEAF ─────────────────────────────────────────────────────────────────
# false en dev pour voir les modifications sans redémarrer
# En production, le cache peut être activé via env variable
spring.thymeleaf.cache=${THYMELEAF_CACHE:false}

# ── ENCODAGE ──────────────────────────────────────────────────────────────────
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true

# ── PORT ──────────────────────────────────────────────────────────────────────
# Railway injecte automatiquement la variable PORT
server.port=${PORT:8080}
