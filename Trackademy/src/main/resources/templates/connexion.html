<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion — Trackademy</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="auth-body">

<div class="auth-page">
    <div class="auth-card">

        <!-- Logo -->
        <div class="auth-logo">
            <i class="fa-solid fa-graduation-cap"></i>
            <span>Trackademy</span>
        </div>

        <h1 class="auth-title">Bon retour !</h1>
        <p class="auth-sub">Connectez-vous à votre espace étudiant</p>

        <!-- Succès après inscription -->
        <div class="auth-alert auth-alert-success"
             th:if="${succes != null}" th:text="${succes}"></div>

        <!-- Confirmation déconnexion -->
        <div class="auth-alert auth-alert-info"
             th:if="${deconnecte != null}" th:text="${deconnecte}"></div>

        <!-- Erreur de connexion -->
        <div class="auth-alert auth-alert-error"
             th:if="${erreur != null}" th:text="${erreur}"></div>

        <!-- Formulaire Spring Security -->
        <form th:action="@{/connexion}" method="post" class="auth-form">

            <!-- Token CSRF (requis par Spring Security) -->
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

            <div class="auth-field">
                <label for="email">
                    <i class="fa-solid fa-envelope"></i> Adresse courriel
                </label>
                <input type="email" id="email" name="email"
                       placeholder="votre@email.com" required autocomplete="email">
            </div>

            <div class="auth-field">
                <label for="motDePasse">
                    <i class="fa-solid fa-lock"></i> Mot de passe
                </label>
                <input type="password" id="motDePasse" name="motDePasse"
                       placeholder="••••••••" required autocomplete="current-password">
            </div>

            <button type="submit" class="auth-btn">
                <i class="fa-solid fa-right-to-bracket"></i> Se connecter
            </button>

        </form>

        <div class="auth-footer">
            Pas encore de compte ?
            <a th:href="@{/inscription}">Créer un compte</a>
        </div>

    </div>
</div>

</body>
</html>
