<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<aside class="sidebar" th:fragment="sidebar(activePage)">

    <!-- Logo -->
    <div class="sidebar-logo">
        <div class="logo-text">Trackademy</div>
        <span class="logo-sub" th:text="#{app.studentSpace}">Espace étudiant</span>
    </div>

    <!-- Navigation -->
    <nav class="sidebar-nav">
        <span class="nav-section" th:text="#{nav.section.main}">Principal</span>
        <ul>
            <li>
                <a th:href="@{/}" th:classappend="${activePage == 'dashboard'} ? 'active'">
                    <span class="nav-icon"><i class="fa-solid fa-house fa-fw"></i></span>
                    <span class="nav-label-text" th:text="#{nav.dashboard}">Dashboard</span>
                </a>
            </li>
            <li>
                <a th:href="@{/cours}" th:classappend="${activePage == 'cours'} ? 'active'">
                    <span class="nav-icon"><i class="fa-solid fa-book fa-fw"></i></span>
                    <span class="nav-label-text" th:text="#{nav.courses}">Mes cours</span>
                    <span class="nav-badge"
                          th:if="${sidebarNbCours != null and sidebarNbCours > 0}"
                          th:text="${sidebarNbCours}">0</span>
                </a>
            </li>
            <li>
                <a th:href="@{/devoirs}" th:classappend="${activePage == 'devoirs'} ? 'active'">
                    <span class="nav-icon"><i class="fa-solid fa-pen-to-square fa-fw"></i></span>
                    <span class="nav-label-text" th:text="#{nav.assignments}">Devoirs</span>
                    <span class="nav-badge"
                          th:if="${sidebarNbDevoirs != null and sidebarNbDevoirs > 0}"
                          th:text="${sidebarNbDevoirs}">0</span>
                </a>
            </li>
            <li>
                <a th:href="@{/calendrier}" th:classappend="${activePage == 'calendrier'} ? 'active'">
                    <span class="nav-icon"><i class="fa-solid fa-calendar-days fa-fw"></i></span>
                    <span class="nav-label-text" th:text="#{nav.calendar}">Calendrier</span>
                </a>
            </li>
        </ul>

        <span class="nav-section" th:text="#{nav.section.finance}">Finances</span>
        <ul>
            <li>
                <a th:href="@{/budget}" th:classappend="${activePage == 'budget'} ? 'active'">
                    <span class="nav-icon"><i class="fa-solid fa-wallet fa-fw"></i></span>
                    <span class="nav-label-text" th:text="#{nav.budget}">Budget</span>
                </a>
            </li>
        </ul>
    </nav>

    <!-- Illustration décorative -->
    <div class="sidebar-deco">
        <i class="fa-solid fa-graduation-cap"></i>
    </div>

    <!-- Profil -->
    <div class="sidebar-profile">
        <img src="https://tse2.mm.bing.net/th/id/OIP.xW0UnGHOWNTRKzozDPDTawHaHa?pid=Api&P=0&h=180" alt="Photo profil">
        <div>
            <span class="profile-name">Lashwana</span>
            <span class="profile-role" th:text="#{profile.role.student}">Étudiante</span>
        </div>
    </div>

    <!-- Bouton déconnexion -->
    <form th:action="@{/logout}" method="post" class="sidebar-logout-wrap">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <button type="submit" class="sidebar-logout-btn">
            <span class="nav-icon"><i class="fa-solid fa-right-from-bracket fa-fw"></i></span>
            <span class="nav-label-text">Se déconnecter</span>
        </button>
    </form>

</aside>
</body>
</html>
