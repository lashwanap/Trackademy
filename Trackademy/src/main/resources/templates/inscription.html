<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscription — Trackademy</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="auth-body">

<div class="auth-page">
    <div class="auth-card auth-card-wide">

        <!-- Logo -->
        <div class="auth-logo">
            <i class="fa-solid fa-graduation-cap"></i>
            <span>Trackademy</span>
        </div>

        <h1 class="auth-title">Créer un compte</h1>
        <p class="auth-sub">Rejoignez votre espace étudiant Trackademy</p>

        <!-- Erreur -->
        <div class="auth-alert auth-alert-error"
             th:if="${erreur != null}" th:text="${erreur}"></div>

        <form th:action="@{/inscription}" method="post" class="auth-form">

            <!-- Prénom + Nom -->
            <div class="auth-row">
                <div class="auth-field">
                    <label for="prenom">
                        <i class="fa-solid fa-user"></i> Prénom
                    </label>
                    <input type="text" id="prenom" name="prenom"
                           placeholder="Votre prénom" required>
                </div>
                <div class="auth-field">
                    <label for="nom">
                        <i class="fa-solid fa-user"></i> Nom
                    </label>
                    <input type="text" id="nom" name="nom"
                           placeholder="Nom de famille" required>
                </div>
            </div>

            <!-- Courriel -->
            <div class="auth-field">
                <label for="email">
                    <i class="fa-solid fa-envelope"></i> Adresse courriel
                </label>
                <input type="email" id="email" name="email"
                       placeholder="votre@email.com" required autocomplete="email">
            </div>

            <!-- Programme + Session -->
            <div class="auth-row">
                <div class="auth-field">
                    <label for="programme">
                        <i class="fa-solid fa-graduation-cap"></i> Programme
                    </label>
                    <select id="programme" name="programme" required>
                        <option value="">Choisir...</option>
                        <option value="Informatique">Informatique</option>
                        <option value="Génie logiciel">Génie logiciel</option>
                        <option value="Administration">Administration</option>
                        <option value="Sciences">Sciences</option>
                        <option value="Arts">Arts</option>
                        <option value="Autre">Autre</option>
                    </select>
                </div>
                <div class="auth-field">
                    <label for="session">
                        <i class="fa-solid fa-calendar-days"></i> Session
                    </label>
                    <select id="session" name="session" required>
                        <option value="">Choisir...</option>
                        <option value="Hiver 2026">Hiver 2026</option>
                        <option value="Été 2026">Été 2026</option>
                        <option value="Automne 2026">Automne 2026</option>
                        <option value="Hiver 2027">Hiver 2027</option>
                    </select>
                </div>
            </div>

            <!-- Mots de passe -->
            <div class="auth-row">
                <div class="auth-field">
                    <label for="motDePasse">
                        <i class="fa-solid fa-lock"></i> Mot de passe
                    </label>
                    <input type="password" id="motDePasse" name="motDePasse"
                           placeholder="Min. 6 caractères" required
                           autocomplete="new-password" minlength="6">
                </div>
                <div class="auth-field">
                    <label for="motDePasseConfirm">
                        <i class="fa-solid fa-lock"></i> Confirmer
                    </label>
                    <input type="password" id="motDePasseConfirm" name="motDePasseConfirm"
                           placeholder="Répétez le mot de passe" required
                           autocomplete="new-password" minlength="6">
                </div>
            </div>

            <button type="submit" class="auth-btn">
                <i class="fa-solid fa-user-plus"></i> Créer mon compte
            </button>

        </form>

        <div class="auth-footer">
            Déjà un compte ?
            <a th:href="@{/connexion}">Se connecter</a>
        </div>

    </div>
</div>

</body>
</html>
